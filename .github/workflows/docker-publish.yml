name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/mongo-backup

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Smoke test antes de publicar: sobe um Mongo, faz o backup de verdade
      # e confere que o arquivo existe — log de sucesso não é evidência.
      - name: Test
        run: |
          docker build -t mongo-backup:ci .
          docker run -d --name mongo -p 27017:27017 mongo:7
          sleep 10
          docker run --rm --network host -v "$PWD/out:/backups" \
            -e MONGO_URI=mongodb://localhost:27017 mongo-backup:ci backup
          test -n "$(find out -name '*.tar')" || { echo "nenhum backup gerado"; exit 1; }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
