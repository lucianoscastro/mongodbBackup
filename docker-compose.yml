services:
  mongo-backup:
    image: lzcsoftware/mongo-backup:latest
    container_name: mongo-backup
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backups:/backups
    # mongodump é Go e não usa muita RAM (o mongosh, que era Node.js, usava).
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
